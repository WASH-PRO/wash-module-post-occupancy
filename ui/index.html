<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Post Occupancy Monitor</title>
  <link rel="stylesheet" href="wash-module-ui.css" />
</head>
<body class="wm-body">
  <div id="wm-app"></div>
  <script src="wash-module-sdk.js"></script>
  <script>
    WashModule.createPage({
      moduleId: 'post-occupancy-monitor',
      accent: '#0ea5e9',
      refreshInterval: 10000,
      title: { ru: 'Монитор занятости постов', en: 'Post occupancy monitor' },
      subtitle: {
        ru: 'Опрашивает состояния постов CRM и показывает занятость в реальном времени.',
        en: 'Polls CRM post states and shows live occupancy.',
      },
      settingsHtml: `
        <div class="wm-field">
          <label class="wm-field-label" for="poll_interval">${WashModule.t({ ru: 'Интервал опроса (сек)', en: 'Poll interval (sec)' })}</label>
          <input class="wm-input" id="poll_interval" type="number" name="poll_interval" min="15" max="3600" />
          <span class="wm-field-hint">${WashModule.t({ ru: 'Как часто обновлять снимок состояния постов.', en: 'How often to refresh the post state snapshot.' })}</span>
        </div>`,
      collectSettings(form) {
        return { poll_interval: Number(form.poll_interval.value) };
      },
      applySettings(settings, form) {
        form.poll_interval.value = settings.poll_interval ?? 60;
      },
      metrics(snap, status) {
        if (!snap || !snap.recordedAt) return [];
        return [
          { label: WashModule.t({ ru: 'Всего постов', en: 'Total posts' }), value: snap.total ?? 0, accent: true },
          { label: WashModule.t({ ru: 'Занято', en: 'Busy' }), value: snap.busy ?? 0, tone: 'accent' },
          { label: WashModule.t({ ru: 'Свободно', en: 'Free' }), value: snap.free ?? 0 },
          { label: WashModule.t({ ru: 'Офлайн', en: 'Offline' }), value: snap.offline ?? 0 },
        ];
      },
      renderOverview(snap, status) {
        if (!snap || !snap.recordedAt) {
          const running = status && (status.activeRunStatus === 'running' || (status.state && status.state.status === 'running'));
          const hint = running
            ? WashModule.t({ ru: 'Ожидание первого цикла опроса…', en: 'Waiting for the first poll cycle…' })
            : WashModule.t({ ru: 'Нет снимка — запустите модуль.', en: 'No snapshot yet — start the module.' });
          return `<div class="wm-empty">${WashModule.escapeHtml(hint)}</div>`;
        }
        const posts = Array.isArray(snap.posts) ? snap.posts : [];
        const busyPosts = posts.filter((p) => p.busy).slice(0, 8);
        const list = busyPosts.length
          ? `<ul class="wm-list">${busyPosts.map((p) =>
              `<li><span class="wm-kv"><span>${WashModule.escapeHtml(String(p.postId || '—'))}</span><span class="wm-tag">${WashModule.escapeHtml(String(p.mode || 'busy'))}</span></span></li>`
            ).join('')}</ul>`
          : `<p class="wm-field-hint">${WashModule.escapeHtml(WashModule.t({ ru: 'Сейчас нет занятых постов.', en: 'No busy posts right now.' }))}</p>`;
        return `
          <h2 class="wm-section-title">${WashModule.t({ ru: 'Занятые посты', en: 'Busy posts' })}</h2>
          ${list}
          <h2 class="wm-section-title" style="margin-top:1rem">${WashModule.t({ ru: 'Сырые данные', en: 'Raw snapshot' })}</h2>
          <pre class="wm-code">${WashModule.escapeHtml(JSON.stringify(snap, null, 2))}</pre>`;
      },
    });
  </script>
</body>
</html>
